<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <link href="icons/site_icon.png" rel="icon">
    <link href="style.css" rel="stylesheet">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Lore</title>
</head>
<body>
    <div id="bg"></div>
    <div id="languages">
            <button id="en">EN</button>
            <button id="fr">FR</button>
    </div>
    <button id="back"><a href="index.html">◀</a></button>

     <!-- Book -->
<section id="sbook">
    <div id="book" class="book">
        <!-- Paper 1 -->
        <div id="p1" class="paper">
            <div class="front card" id="firstCard">
                <div id="f1" class="front-content">
                    <h1>Lore</h1>
                    <img src="icons/lore_icon.png" alt="Book's illustration">
                </div>
            </div>
            <div class="back">
                <div id="b1" class="back-content"></div>
            </div>
        </div>
        <!-- Paper 2 -->
        <div id="p2" class="paper">
            <div class="front card">
                <div id="f2" class="front-content">
                    <h3 data-i18n="bookDescription">This book contains :</h3>
                    <ul>
                        <li data-i18n="lore1Title">Guardians</li>
                        <li data-i18n="lore2Title">Protectors</li>
                        <li data-i18n="lore3Title">Non-Protectors</li>
                    </ul>
                </div>
            </div>
            <div class="back card">
                <div id="b2" class="back-content">
                    <h3 data-i18n="guardian1Title"></h3>
                    <p data-i18n="guardian1"></p>
                    <p data-i18n="guardian2"></p>
                    <p data-i18n="guardian3"></p>
                    <p data-i18n="guardian4"></p>
                </div>
            </div>
        </div>
        <!-- Paper 3 -->
        <div id="p3" class="paper">
            <div class="front card">
                <div id="f3" class="front-content">
                    <img src="img/lore/lore-img-01.png" alt="Guardians explanations">
                </div>
            </div>
            <div class="back card">
                <div id="b3" class="back-content">
                    <h3 data-i18n="guardian2Title"></h3>
                    <p data-i18n="guardian5"></p>
                    <img src="img/lore/lore-img-02.png" alt="Father tree explanations">
                </div>
            </div>
        </div>
        <!-- Paper 4 -->
        <div id="p4" class="paper">
            <div class="front card">
                <div id="f4" class="front-content">
                    <h3 data-i18n="guardian3Title"></h3>
                    <p data-i18n="guardian6"></p>
                    <img src="img/lore/lore-img-03.png" alt="Emotions explanations">
                </div>
            </div>
            <div class="back card">
                <div id="b4" class="back-content">
                    <h3 data-i18n="protector1Title"></h3>
                    <p data-i18n="protector1"></p>
                    <p data-i18n="protector2"></p>
                    <p data-i18n="protector3"></p>
                </div>
            </div>
        </div>
        <!-- Paper 5 -->
        <div id="p5" class="paper">
            <div class="front card">
                <div id="f5" class="front-content">
                    <img src="img/lore/lore-img-04.png" alt="Protectors explanations">
                </div>
            </div>
            <div class="back card">
                <div id="b5" class="back-content">
                    <h3 data-i18n="protector2Title"></h3>
                    <p data-i18n="protector4"></p>
                    <p data-i18n="protector5"></p>
                    <p data-i18n="protector6"></p>
                </div>
            </div>
        </div>
        <!-- Paper 6 -->
        <div id="p6" class="paper">
            <div class="front card">
                <div id="f6" class="front-content">
                    <img src="img/lore/lore-img-05.png" alt="Magic powers explanations">
                </div>
            </div>
            <div class="back card">
                <div id="b6" class="back-content">
                    <h3 data-i18n="protector3Title"></h3>
                    <p data-i18n="protector7"></p>
                    <p data-i18n="protector8"></p>
                    <img src="img/lore/lore-img-06.png" alt="Differences explanations">
                </div>
            </div>
        </div>
        <!-- Paper 7 -->
        <div id="p7" class="paper">
            <div class="front card">
                <div id="f7" class="front-content">
                    <h3 data-i18n="protector4Title"></h3>
                    <p data-i18n="protector9"></p>
                    <p data-i18n="protector10"></p>
                    <p data-i18n="protector11"></p>
                </div>
            </div>
            <div class="back card" id="lastCard">
                <div id="b7" class="back-content">
                    <h3 data-i18n="bookClose">THE END</h3>
                </div>
            </div>
        </div>
    </div>
    <p id="switch" data-i18n="switch">◄ Switch the cards ►</p>
</section>
<div id="bookBtn">
    <button id="prev-btn">
        <p>◄</p>
    </button>
    <button id="next-btn">
        <p>►</p>
    </button>
</div>
<footer>
    <small data-i18n="pfooter">Created by NeWiAr</small>
</footer>
</body>
<script src="languages.js"></script>
<script>
    if (window.matchMedia("(min-width: 769px)").matches) {
        const s = document.createElement("script");
        s.src = "book-desktop.js";
        document.body.appendChild(s);
    }
</script>
<script src="book-mobile.js"></script>
</html>
